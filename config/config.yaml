networks:
  enabled: true  # Set to true to infer microbial co-occurrence networks
  # Method: 'spiec-easi', 'sparcc', or 'proportionality'
  method: 'spiec-easi'
  # Minimum feature prevalence
  min_prevalence: 0.1
  # Method-specific parameters
  spiec_easi:
    method: 'mb'  # 'mb' (Meinshausen-Bühlmann) or 'glasso' (graphical lasso)
    nlambda: 20
    lambda_min_ratio: 0.01
    pulsar_rep: 20  # StARS stability selection reps
    ncores: 8
  sparcc:
    iterations: 20
    exclude_iterations: 10
    threshold: 0.1  # Correlation threshold
    bootstraps: 100  # For p-value calculation
  methods_to_compare: ['spiec-easi', 'sparcc']
  # Visualization
  plots:
    network_graph: true
    interactive: true
  # Output directory
  output_dir: '04_analysis/networks'

