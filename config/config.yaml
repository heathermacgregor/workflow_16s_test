# ===================================================================
#                      16S WORKFLOW CONFIGURATION
# ===================================================================

# -------------------------------------------------------------------
#  Paths & Directories 📂
# -------------------------------------------------------------------
paths:
  # Base directory for the project
  base: "/usr2/people/macgregor/amplicon/" 
  # Output directory for the project
  project: "/usr2/people/macgregor/amplicon/project_01" 
  # Path to the directory containing your BLAST database
  blast_db: "/usr2/people/macgregor/blast_db/SILVA_16S_db" 
  # Path to the VSEARCH database
  vsearch_db: "/usr2/people/macgregor/blast_db/silva_nr99.udb"
  # Path to the QIIME2 classifier directory
  classifier: "/usr2/people/macgregor/amplicon/workflow_16s/resources/classifier/silva-138-99-515-806"
  # Path to the QIIME2 phylogeny directory
  phylogeny: "/usr2/people/macgregor/amplicon/workflow_16s/resources/phylogeny/gg-2022-10-ssu-nr99"
  # Directory containing manually collected metadata
  manual_metadata: "/usr2/people/macgregor/manual_metadata"
  # List of datasets
  dataset_list: "/usr2/people/macgregor/amplicon/workflow_16s/resources/input/example_01/datasets.txt"
  # Dataset metadata
  dataset_info: "/usr2/people/macgregor/amplicon/workflow_16s/resources/input/example_01/datasets.tsv"
  # Path to the primer SQLite database
  primer_db: "/usr2/people/macgregor/amplicon/workflow_16s/src/data/primer_data.db"

datasets:
  dataset_list: "/usr2/people/macgregor/amplicon/workflow_16s/resources/input/example_01/datasets.txt"
  dataset_info: "/usr2/people/macgregor/amplicon/workflow_16s/resources/input/example_01/datasets.tsv"

# -------------------------------------------------------------------
#  Quality Control & Filtering Thresholds 🎯
# -------------------------------------------------------------------
quality_control:
  # Minimum sequencing depth (counts per sample) for filtering
  min_sequencing_depth: 5000
  # Minimum sample prevalence (number of samples a feature must appear in)
  min_sample_prevalence: 2
  # Default DPI for saved plots (higher = better quality, larger files)
  plot_dpi: 150

# -------------------------------------------------------------------
#  Phylogeny & Tree Construction 🌳
# -------------------------------------------------------------------
phylogeny:
  # Conda environment path or name for phylogenetic tools (MAFFT, FastTree)
  # Can be absolute path (e.g., "/path/to/conda/envs/qiime2-amplicon-2025.7")
  # or environment name (e.g., "qiime2-amplicon-2025.7")
  # If null, will auto-detect from current Python environment
  conda_env: null 


# -------------------------------------------------------------------

#  Execution & Performance Parameters 🚀
#  Control the computational resources used by the pipeline.
#  For downstream ingestion, the number of parallel workers/cores is set by:
#    execution.threads (preferred), cpu.limit, or execution.cpu_limit (fallback order)
#  If not set, defaults to 8. Max is capped at system CPU count (64).
# -------------------------------------------------------------------
verbose: True # Enable verbose logging for debugging
execution:
  threads: 8 # Number of parallel workers/cores for downstream ingestion and other multithreaded tasks
  cpu_limit: 8  # Global CPU limit for all operations
  max_concurrency: 8 # (For Snakemake) The maximum number of jobs to run in parallel
cpu:
  limit: 8  # Global CPU limit for all operations

# -------------------------------------------------------------------
# WEB SCRAPING SETTINGS
# -------------------------------------------------------------------
web:
  user_agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'

# -------------------------------------------------------------------
# CREDENTIALS
# -------------------------------------------------------------------
