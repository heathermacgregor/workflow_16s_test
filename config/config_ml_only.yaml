# -------------------------------------------------------------------
# HTML REPORT GENERATION - **ENABLED**
# -------------------------------------------------------------------
reporting:
  enabled: True  # *** ENABLED ***
  
  # Include only ML and synthesis sections
  include_sections:
    - 'machine_learning'
    - 'ml_strategy_comparison'
    - 'ml_group_fingerprints'
    - 'ml_batch_effects'
    - 'synthesis'
  
  # Output format
  output_dir: "05_reports"
  report_name: "ML_Strategy_Comparison_Report.html"
  
  # ML-specific reporting options
  ml_report:
    strategy_comparison_dashboard: True  # Include strategy comparison
    group_fingerprints: True  # Include group-specific biomarkers
    batch_effect_analysis: True  # Show batch effect impact
    feature_stability: True  # Show feature consistency across strategies
    performance_metrics: True  # Include all performance metrics
    shap_visualizations: True  # Include all SHAP plots
    
    # Targets to include in report
    targets:
      - 'facility_match'
      - 'facility_distance_km'
      - 'facility_type'
      - 'facility_status'
      - 'nuclear_contamination_status'
    
    # Strategies to compare
    strategies:
      - 'baseline'  # No batch correction
      - 'agnostic'  # Batch excluded
      - 'group_validated'  # Group-aware CV
    
    # Top N features to display
    top_n_features: 30
    
    # Group comparisons
    group_comparisons:
      enabled: True
      grouping_variables:
        - 'facility_match'
        - 'facility_type'
        - 'facility_status'
        - 'contamination_status'
        - 'env_biome'
        - 'env_feature'

