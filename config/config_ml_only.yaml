# -------------------------------------------------------------------
# MACHINE LEARNING - **ENABLED** (MAIN FOCUS)
# -------------------------------------------------------------------
# -------------------------------------------------------------------
# MACHINE LEARNING - UNIFIED CONFIGURATION
# -------------------------------------------------------------------
ml: 
  strict_targets: true
  enabled: True 
  load_existing: True 
  n_threads: 16
  num_features: 100
  step_size: 100
  
  # THE MATRIX
  grid_settings:
    levels: 
      - "Genus"
      #- "Family"
    
    transformations:
      - "clr"
      #- "binary" # Test presence/absence
    
    fs_strategies:
      - "baseline"          # Standard random split
      - "agnostic"          # Explicitly drops batch columns
      - "batch_adjusted"    # Includes batch as a feature
      - "group_validated"   # Uses GroupKFold (strict isolation)
      
    # Model Training Strategies (Random Forest / CatBoost)
    batch_strategies:
      - "baseline"          # No correction
      - "covariate_adjusted" # Include batch vars as features
      - "stratified"        # Two-stage residual modeling

  # Define your targets HERE so they are read by MLConfig
  targets:
    - 'facility_match' # Primary target
    - 'facility_distance_km' # Secondary target
    #- 'facility_type' # Tertiary target (if data available)
    #- 'facility_status' # Quaternary target (if data available)
    #- 'nuclear_contamination_status' # Compare with facility matches
  
  permutation_importance: 
    enabled: False
  
  plots:
    enabled: True
    
  # CRITICAL: This section explicitly disables the crash-prone test
  overfitting_prevention:
    enabled: True            # Keep the module on for Cross-Validation
    permutation_test: False  # <--- THIS WILL NOW WORK
  
  models:
    enable_random_forest: False
    enable_catboost: True
    enable_regression: True      # Disable all regression tasks
    enable_classification: True
    n_estimators: 500              # Increase trees for better performance
    max_depth: 20
    
  validation:
    test_size: 0.3                 # Use 80/20 split instead of 70/30
    cv_folds: 10

  tables:
    raw:
      enabled: False
      levels: []
      methods: []
    filtered:
      enabled: False
      levels: []
      methods: []
    normalized:
      enabled: False
      levels: []
      methods: []
    clr_transformed:
      enabled: True
      levels: ["genus"]
      methods: ["shap"]
    presence_absence:
      enabled: False
      levels: []
      methods: []

  # Merged Batch Covariates Section
  batch_covariates:
    enabled: True
    covariate_columns:
      - 'sequencing_center'
      - 'instrument_platform'
      - 'instrument_model'
      - 'library_layout'
      - 'pcr_primer_fwd'
      - 'pcr_primer_rev'
      - 'target_subfragment'
      - 'study_accession'
    
    covariate_adjustment:
      enabled: True
      output_suffix: '_batch_adjusted'
      one_hot_encode: True
      max_categories: 20
      scale_covariates: False
    
    stratified_prediction:
      enabled: True
      output_suffix: '_batch_residual'
      consistent_split: True
      save_batch_models: True
    
    confounding_detection:
      enabled: True
      correlation_threshold: 0.7
      methods: ['cramer_v', 'eta_squared', 'spearman']
      plot_confounding: True
    
    comparison:
      enabled: True
      compare_metrics: ['accuracy', 'r2', 'oob_score', 'feature_importance_overlap']
      plot_comparison: True
      generate_summary: True

